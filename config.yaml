# InfraAgent Configuration
# All values here are overridable via environment variables (see .env.example)
# or CLI flags (see scripts/run_experiments.py --help).

# ── Model Selection ───────────────────────────────────────────────────────────
model:
  # Primary model for IaC generation.
  # Local (Ollama) options:
  #   deepseek-coder-v2:16b-lite-instruct-q4_K_M   (best open-source, ~9 GB)
  #   codellama:13b-instruct-q4_K_M                 (~7 GB)
  #   mistral:7b-instruct-q4_K_M                    (~4 GB)
  #   phi3:3.8b-mini-instruct-4k-q4_K_M             (~2 GB)
  #   llama3.1:70b-instruct-q4_K_M                  (~40 GB)
  #   qwen2.5-coder:32b-instruct-q4_K_M             (~18 GB)
  # Commercial API options (set keys in .env):
  #   gpt-4o                                         (~$5 per 300-task run)
  #   claude-3-5-sonnet-20241022                     (~$6 per 300-task run)
  primary: deepseek-coder-v2:16b-lite-instruct-q4_K_M

  # GGUF quantization level (local models only)
  # Q4_K_M: best quality/size tradeoff (paper default)
  # Q2_K:   smaller but lower quality (use for 70B on 32 GB RAM)
  quantization: Q4_K_M

  # Ollama server address
  ollama_host: http://localhost:11434

  # Request timeout in seconds (increase for 70B models)
  ollama_timeout: 300

  # Generation temperature — keep at 0 for reproducibility
  temperature: 0

  # Context window tokens (8192 fits all models; reduce if OOM)
  num_ctx: 8192

# ── RAG Configuration ─────────────────────────────────────────────────────────
rag:
  # Sentence-transformer embedding model.
  # all-MiniLM-L6-v2: fast, ~90 MB (paper default)
  # BAAI/bge-large-en-v1.5: +2.3pp P@5 but ~1.3 GB and 3x slower
  embedding_model: all-MiniLM-L6-v2

  # Number of passages retrieved per query (k in P@k, R@k, NDCG@k)
  retrieval_k: 5

  # Path to RAG corpus markdown files
  corpus_path: ./rag_corpus/

  # ChromaDB vector store persistence directory
  chroma_path: ./.chroma/

  # Re-rank retrieved passages using a cross-encoder before injection
  # (not used in paper experiments; enables future ablation)
  rerank_enabled: false

  # Cross-encoder model for re-ranking (only used if rerank_enabled: true)
  rerank_model: cross-encoder/ms-marco-MiniLM-L-6-v2

  # Maximum characters of retrieved context injected into prompt
  max_context_chars: 4096

# ── Validation Layers ─────────────────────────────────────────────────────────
validation:
  # L1: Syntax — yamllint (K8s), hclfmt (TF), hadolint (Dockerfile)
  layer1_syntax: true

  # L2: Schema — kubeconform (K8s), terraform validate (TF)
  layer2_schema: true

  # L2.5: Server-side dry-run — kubectl apply --dry-run=server
  # Requires a running kind cluster (see scripts/setup_kind_cluster.sh)
  # Skipped gracefully when no cluster is reachable.
  layer2_5_dry_run: false

  # Kubernetes version for kubeconform schema validation
  k8s_version: "1.29.0"

  # L3: Security — Checkov + Trivy
  layer3_security: true

  # Minimum Checkov/Trivy score to pass L3 (0.0–1.0)
  security_threshold: 0.50

  # L4: Best practices — OPA/Conftest
  layer4_best_practices: true

  # Minimum best-practice score to pass L4 (0.0–1.0)
  best_practice_threshold: 0.60

# ── Self-Correction ───────────────────────────────────────────────────────────
self_correction:
  # Maximum correction rounds (0 = one-shot only)
  # Paper conditions: 0 (one-shot), 3 (sc+3r), 5 (sc+5r)
  max_rounds: 3

  # Reformulate RAG query in correction rounds using error messages
  # true:  query = task description + validation error messages (paper default)
  # false: reuse initial generation query
  reformulate_query: true

  # Maximum errors to include in correction prompt (avoids token overflow)
  max_errors_in_prompt: 10

# ── Experiment Parameters ─────────────────────────────────────────────────────
experiment:
  # Random seed for task ordering and ChromaDB tie-breaking
  # Paper uses seeds 42–46 across 5 independent runs
  task_seed: 42

  # Number of tasks to evaluate (max 300; use lower value for quick tests)
  num_tasks: 300

  # Number of tasks to process in parallel (1 = sequential, paper default)
  # Increase for API models; keep at 1 for local models to avoid OOM
  batch_size: 1

  # Print per-task progress and validation results
  verbose: true

  # Save generated code and validation reports for each task
  save_intermediate: true

  # Output directory for raw JSONL files
  output_dir: ./results/raw_data/

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: INFO           # DEBUG, INFO, WARNING, ERROR
  file: ./logs/infraagent.log
  max_bytes: 10485760   # 10 MB log rotation
  backup_count: 3
