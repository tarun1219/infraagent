# Example: Self-corrected output for task k8s-003
# Generated by InfraAgent (deepseek-coder-v2, sc+rag+3r, round 2)
# Initial output: security=FAIL (CKV_K8S_30, CKV_K8S_22, deprecated API)
# After self-correction round 2: functional=PASS, security=PASS
#
# Correction feedback provided to model:
#   Round 1 errors:
#     [L2] autoscaling/v2beta2 is deprecated, use autoscaling/v2
#     [L3] CKV_K8S_30: runAsNonRoot must be true
#     [L3] CKV_K8S_22: readOnlyRootFilesystem must be true
#     [L3] CKV_K8S_36: Drop ALL capabilities

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-api
  namespace: default
  labels:
    app: web-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-api
  template:
    metadata:
      labels:
        app: web-api
    spec:
      securityContext:
        runAsNonRoot: true      # Fixed: CKV_K8S_30
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: web-api
        image: nginx:1.25.3     # Fixed: pinned tag
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true   # Fixed: CKV_K8S_22
          capabilities:
            drop: ["ALL"]               # Fixed: CKV_K8S_36
        resources:
          limits:
            cpu: "500m"
            memory: "128Mi"
          requests:
            cpu: "250m"
            memory: "64Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
---
apiVersion: autoscaling/v2           # Fixed: updated from v2beta2
kind: HorizontalPodAutoscaler
metadata:
  name: web-api-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
